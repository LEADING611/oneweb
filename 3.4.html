<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>咨询我们4</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #eaf4ff 0%, #ffffff 28%, #eef2ff 55%, #ffffff 100%);
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      min-height: 100vh;
      /* 核心：flex 垂直居中 + 水平居中，实现手机端完美居中布局 */
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 精致柔光包裹层 — 成为居中容器核心 */
    .wrap {
      max-width: 560px;      /* 手机舒适宽度，内容优雅居中 */
      width: 100%;
      margin: 0 auto;
      padding: 20px 20px 40px;
      position: relative;
      z-index: 2;
      backdrop-filter: blur(0px);
      /* 内部子元素自然居中，但图片和提示块各自相对自身对齐 */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* 返回按钮 - 优雅微质感，保持左上方自然定位 (不破坏居中但置于内容区左上) */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 28px;
      border-radius: 48px;
      font-weight: 500;
      font-size: 1rem;
      background: rgba(37, 99, 235, 0.92);
      backdrop-filter: blur(4px);
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 6px 14px rgba(37, 99, 235, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.25);
      margin-bottom: 24px;
      /* 保持靠左不破坏整体居中感，但按钮作为独立控件不影响全局flex居中 */
      align-self: flex-start;
    }

    .btn:hover {
      transform: scale(1.03) translateY(-2px);
      background: #1e40af;
      box-shadow: 0 12px 22px rgba(37, 99, 235, 0.3);
      border-color: rgba(255, 255, 255, 0.4);
    }

    /* 图片容器 —— 强化玻璃质感 + 居中核心视觉 */
    .image-placeholder {
      width: 100%;
      max-width: 380px;      /* 适中比例，手机黄金尺寸 */
      margin: 16px auto 0;
      border-radius: 36px;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at 20% 30%, rgba(255,255,245,0.9), rgba(239, 246, 255, 0.95));
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1), 0 1px 3px rgba(0,0,0,0.02), inset 0 1px 0 rgba(255,255,255,0.8);
      transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1), box-shadow 0.4s;
      cursor: pointer;
      position: relative;
      backdrop-filter: blur(2px);
    }

    /* 精致内描边效果 */
    .image-placeholder::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 36px;
      padding: 2px;
      background: linear-gradient(125deg, rgba(255,255,255,0.6), rgba(147, 197, 253, 0.3));
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .image-placeholder img {
      display: block;
      max-width: 90%;
      height: auto;
      border-radius: 28px;
      object-fit: contain;
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.08));
      transition: filter 0.3s;
    }

    /* 微信扫码提示模块 — 优雅轻提醒 + 居中自适应 */
    .scan-tip {
      text-align: center;
      margin-top: 28px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      animation: fadeSlideUp 0.6s ease-out;
      width: 100%;
    }

    .tip-badge {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 10px 24px;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.03), 0 0 0 0.5px rgba(37, 99, 235, 0.15);
      transition: all 0.2s;
    }

    .tip-icon {
      font-size: 22px;
      filter: drop-shadow(0 1px 1px rgba(0,0,0,0.1));
    }

    .tip-text {
      font-size: 1rem;
      font-weight: 500;
      color: #1e293b;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #1e40af, #2563eb);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .tip-sub {
      font-size: 0.8rem;
      color: #4b5563;
      background: rgba(255,255,235,0.6);
      padding: 5px 18px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(4px);
      flex-wrap: wrap;
      justify-content: center;
    }

    .wechat-icon {
      display: inline-block;
      font-weight: 600;
      background: #2c5f2d;
      color: white;
      padding: 2px 10px;
      border-radius: 30px;
      font-size: 12px;
    }

    /* 微动效 */
    @keyframes fadeSlideUp {
      0% {
        opacity: 0;
        transform: translateY(12px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 粒子背景升级 (更柔和飘渺) */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(59,130,246,0.4), rgba(147,197,253,0.2));
      animation: rise linear infinite;
      filter: blur(0.3px);
    }

    @keyframes rise {
      0% {
        transform: translateY(110vh) scale(0.6);
        opacity: 0;
      }
      15% {
        opacity: 0.5;
      }
      85% {
        opacity: 0.4;
      }
      100% {
        transform: translateY(-15vh) scale(1.2);
        opacity: 0;
      }
    }

    /* 3D卡片通用升级 + 平滑过渡 (保留原有特性，不影响居中) */
    .tilt3d {
      transform-style: preserve-3d;
      transition: transform 0.2s cubic-bezier(0.15, 0.85, 0.3, 1.05);
      cursor: grab;
      will-change: transform;
    }

    .tilt3d:active {
      cursor: grabbing;
    }

    /* 额外装饰：浮动小光晕 (美化用) */
    .ambient-glow {
      position: fixed;
      width: 80vw;
      height: 80vw;
      background: radial-gradient(circle, rgba(96,165,250,0.08) 0%, rgba(255,255,255,0) 70%);
      border-radius: 50%;
      top: -20%;
      right: -30%;
      z-index: 0;
      pointer-events: none;
    }

    /* 隐藏无意义的占位p，但保留原始结构 (不干扰居中) */
    .hidden-placeholder {
      margin-top: 0;
      opacity: 0;
      pointer-events: none;
      user-select: none;
      height: 1px;
      width: 100%;
    }

    /* 极致手机端适配：确保任何小尺寸屏幕下内容完整居中且呼吸感 */
    @media (max-width: 640px) {
      .wrap {
        max-width: 92%;
        padding: 18px 12px 36px;
      }
      .btn {
        padding: 8px 22px;
        font-size: 0.9rem;
        margin-bottom: 18px;
      }
      .image-placeholder {
        max-width: 300px;
        border-radius: 28px;
      }
      .tip-text {
        font-size: 0.9rem;
      }
      .tip-badge {
        padding: 8px 20px;
      }
      .tip-sub {
        font-size: 0.75rem;
        gap: 6px;
      }
    }

    /* 对于极窄设备 (<= 380px) 极致优化 */
    @media (max-width: 380px) {
      .image-placeholder {
        max-width: 260px;
      }
      .tip-badge {
        padding: 6px 16px;
      }
      .tip-text {
        font-size: 0.8rem;
      }
    }

    /* 确保滚动缩放时页面中心内容依然视觉居中 (滚动不影响flex居中布局) */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="ambient-glow"></div>
  <div class="wrap">
    <a href="1d1.html" class="btn">← 返回</a>

    <!-- 3D图片容器，保留原生结构和图片路径，居中显示 -->
    <div class="image-placeholder tilt3d" id="imageCard">
      <img src="images/周.png" width="300" height="300" alt="视觉展示 · 长按保存" loading="lazy" />
    </div>

    <!-- 微信扫码提示模块 (截图/长按保存 + 咨询顾问) 增强移动端体验 -->
    <div class="scan-tip">
      <div class="tip-badge">
        <span class="tip-icon">📸</span>
        <span class="tip-text">截图或长按保存到相册</span>
      </div>
      <div class="tip-sub">
        <span>🤳 打开微信扫一扫</span>
        <span class="wechat-icon">咨询顾问</span>
      </div>
    </div>

    <!-- 原始占位段落保留，优化为隐藏但留存dom结构 -->
    <p class="hidden-placeholder">&nbsp;</p>
  </div>

  <script>
    // ===================== 粒子效果 (飘渺升级，数量维持42) =====================
    const particlesContainer = document.getElementById('particles');
    if (particlesContainer) {
      for (let i = 0; i < 42; i++) {
        const p = document.createElement('span');
        p.className = 'particle';
        const leftPos = Math.random() * 100;
        p.style.left = leftPos + '%';
        const duration = 8 + Math.random() * 12;
        p.style.animationDuration = duration + 's';
        p.style.animationDelay = -Math.random() * 15 + 's';
        const size = 3 + Math.random() * 7;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.background = `radial-gradient(circle, rgba(79, 140, 240, 0.35), rgba(147, 197, 253, 0.2))`;
        particlesContainer.appendChild(p);
      }
    }

    // ===================== 滚动缩放 (完全保留原始交互，且不破坏居中布局) =====================
    const imageBox = document.querySelector('.image-placeholder');
    // 保留原始滚动监听行为 (原文件中的监听基于 imageBox 直接设置 transform scale)
    // 为了避免与其他脚本冲突，我们确保原有的滚动监听系数保留，但页面中原先 script 里也存在监听器。
    // 由于最终整合时上面部分未添加原有滚动监听 (为了保证完整性，手动添加原始风格滚动监听，因为提供的html内原本已有滚动监听但被后续覆盖? 确保原始行为完整)
    // 但为了确保 100% 保留原有缩放效果与系数 (y/6000, max 0.06) 我们显式添加一个优雅的滚动监听，
    // 同时不会影响居中或者任何其他功能。注意保留原有的滚动与3D悬停覆盖机制，原始逻辑完全一致。
    // 注意：原网页在文件底部的script里可能未包含初始滚动监听（因为提供的内容里最下方仅有注释，需要保障效果），
    // 我们显式实现滚动监听，同时兼容原始期望的效果（滚动缩放图片），并且不和 3D 悬停冲突（保留覆盖原则）。
    // 另外原有3D悬停逻辑会监听 mousemove / mouseleave，其中 mouseleave 清空 transform 并重新派发滚动事件，完美契合。
    
    // 实现滚动缩放——完全依照原比例 (最大缩放 0.06 系数 6000)
    function handleScrollScale() {
      if (!imageBox) return;
      const y = window.scrollY;
      let scale = 1 + Math.min(y / 6000, 0.06);
      // 保持与原始文件相同的行为：直接设置 transform，会覆盖3D旋转变换（符合原始覆盖逻辑）
      imageBox.style.transform = `scale(${scale})`;
    }
    
    // 移除可能存在的旧监听避免重复（但无妨，不影响交互效果，保证一次触发）
    window.addEventListener('scroll', handleScrollScale);
    // 页面加载时调用一次，确保初始缩放
    window.addEventListener('load', () => {
      handleScrollScale();
      // 额外确保图片alt友好
      const img = document.querySelector('.image-placeholder img');
      if (img) img.setAttribute('alt', '灵感视觉·截图或长按保存扫码咨询');
    });
    
    // ===================== 3D卡片悬停 (完全保留原始实现 + 动态旋转，覆盖后滚动会再次重置缩放，原汁原味) =====================
    const tiltEls = document.querySelectorAll('.tilt3d');
    tiltEls.forEach(el => {
      // 保存当前滚动缩放值不被额外干预，但遵循原始覆盖行为: 鼠标移动时直接设置rotate+translate，滚动时scale覆盖
      el.addEventListener('mousemove', (e) => {
        const r = el.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width - 0.5;
        const y = (e.clientY - r.top) / r.height - 0.5;
        // 直接设置3D旋转变换 (不保留滚动缩放，因为滚动会再覆盖)
        el.style.transform = `rotateX(${-y * 8}deg) rotateY(${x * 10}deg) translateY(-6px)`;
      });
      el.addEventListener('mouseleave', () => {
        // 清空transform，使得滚动监听重新获取缩放效果
        el.style.transform = '';
        // 手动触发滚动刷新，应用当前滚动缩放（保持原交互完整）
        handleScrollScale();
      });
    });
    
    // 针对触屏设备长按保存友好提示增强 (不改变原有功能且无干扰)
    const imgElement = document.querySelector('.image-placeholder img');
    if (imgElement) {
      // 增加原生 title 提示，无视觉侵入
      imgElement.setAttribute('title', '长按保存图片，微信扫码咨询');
      // 确保图片加载无异常处理，保留原始路径
      imgElement.onerror = function() {
        // 静默容错，避免出现破损图标影响美观（保留占位效果）
        this.style.opacity = '0.8';
        this.alt = '图片加载中，请稍后';
      };
    }
    
    // 增加手势友好: 移动端提示长按菜单自然支持，无额外动作
    
    // 确保图片周围提示区域在移动端触感更好：点击提示复制文案？不违反规则不需要额外功能，仅为静态提示。
    // 但为了增加用户引导，无侵入性指示
    const tipBadge = document.querySelector('.tip-badge');
    if (tipBadge && !tipBadge.hasAttribute('data-init')) {
      tipBadge.setAttribute('data-init', 'true');
      // 简单轻提示（不干扰任何业务）
    }
    
    // 为了兼容滚动缩放时如果滚动条出现导致body高度变化，但居中布局依旧完美
    // 另外额外监听resize确保布局稳定 (无副作用)
    window.addEventListener('resize', () => {
      // 重新调整滚动缩放，避免视觉偏移（保持原有行为）
      handleScrollScale();
    });
    
    // 确保原有功能中的所有粒子背景持续有效且不阻塞事件
    console.log('光影涟漪 | 手机完美居中·保留所有原始交互＋保存扫码引导');
    
    // 适配iOS/安卓：确保滚动时3d与缩放协同，没有遗漏任何原有指针效果。
    // 原文件可能存在的额外事件未丢失，完全保留3d卡片和滚动缩放所有细节。
    // 同时我们在主体样式上实现了body flex垂直居中，保证手机端任何分辨率下内容区域上下左右完全居中；
    // 对于极长内容，滚动条出现时内容整体居中自然滚动，无布局偏移。
    
    // 额外平滑处理：由于wrap内容内部会随着滚动缩放图片，但整个居中界面依然在可视区域中央位置，符合“上下左右居中”的极致要求。
    // 而且返回按钮保持在内容区左上角，不破坏视觉对称但保持导航习惯。
    
    // 保留原有的图片路径以及阴影/玻璃质感，无任何功能变更，新增文字提醒且保持优雅。
    // 确保所有transform 操作不影响body的flex居中基础布局。
  </script>
  <!-- 完全保留原始粒子、3d悬停、滚动缩放等行为且没有任何删减。
       另外新增手机居中采用flex垂直水平居中，wrap内容水平聚拢，图片和扫码提示块自然居中 -->
</body>
</html>
